asyncapi: 3.0.0
info:
  title: Operativt uppgiftslager Async API
  version: 1.2.0
  description: Publicerar statusuppdateringar för manuella uppgifter i operativt uppgiftslager

channels:
  operativt.uppgiftslager.status.notification:
    messages:
      OperativtUppgiftslagerStatusMessage:
        $ref: '#/components/messages/OperativtUppgiftslagerStatusMessage'

operations:
  operativtUppgiftslagerStatusNotification:
    action: send
    channel:
      $ref: '#/channels/operativt.uppgiftslager.status.notification'
    summary: Publicerar statusuppdateringar

components:
  messages:
    OperativtUppgiftslagerStatusMessage:
      payload:
        title: OperativtUppgiftslagerStatusMessage
        $ref: "#/components/schemas/OperativtUppgiftslagerStatusMessage"

  schemas:
    OperativtUppgiftslagerStatusMessage:
      type: object
      title: OperativtUppgiftslagerStatusMessage
      required:
        - handlaggning_id
        - uppgift_id
        - status
        - cloudevent_attributes
      properties:
        handlaggning_id:
          type: string
          format: uuid
          description: Unikt ID som identifierar handläggningsärendet
        uppgift_id:
          type: string
          format: uuid
          description: Unikt ID som identifierar instansen av uppgifts-objektet
        utforar_id:
          $ref: "#/components/schemas/Idtyp"
          description: Unikt ID som identifierar den tilldelade utföraren
        status:
          title: status
          type: string
          description: Status för uppgiften
          enum:
            - Ny
            - Tilldelad
            - Avslutad
            - Avbruten
        cloudevent_attributes:
          $ref: "#/components/schemas/CloudeventAttributes"

    CloudeventAttributes:
      type: object
      title: CloudeventAttributes
      additionalProperties:
        type: string
      description: CloudEvent-attribut som skickas med i request och returneras oförändrade i response och statusnotifikationer

    Idtyp:
      type: object
      properties:
        typId:
          type: string
          comment: Unikt ID som identifierar vilken typ av värde som anges
        varde:
          type: string
          comment: ID-värde som identifieras av typ
      required:
        - typId
        - varde
      example:
        typId: "4c34906c-03d9-425f-9a1a-062ef6eb88c7"
        varde: "19901010-1234"